<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../static/css/style.css">
</head>

<body>

<div class="page">

<div class="login-box">

<h2 class="title">Login Portal</h2>

<form method="POST" action="/login">

<!-- ROLE BUTTONS -->

<div class="role-select">

<input type="radio" name="role" value="student" id="student" checked>
<label for="student" class="role-btn">Student</label>

<input type="radio" name="role" value="teacher" id="teacher">
<label for="teacher" class="role-btn">Teacher</label>

</div>
<input type="text"name="user_id"placeholder="Enter ID"required>
<input type="password" name="password" placeholder="Enter Password"required>
<br>
<button type="submit">Sign In</button>

</form>

</div>

</div>

</body>
</html>
